name: TechPulse AI Fast Collector Sweep

on:
  schedule:
    # Run high-frequency collector sweep every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual trigger for testing collector separately

jobs:
  fast-collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Execute Fast Collector Sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          PYTHONPATH: src
        run: uv run techpulse-ops run collect
