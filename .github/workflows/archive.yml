name: TechPulse AI Intelligence Archive

on:
  schedule:
    # Run weekly Hugging Face export every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger for on-demand backups

permissions:
  contents: read

concurrency:
  group: techpulse-archive
  cancel-in-progress: false

jobs:
  weekly-hf-export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Export to Hugging Face
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: src
        run: |
          uv run techpulse-ops run hf-export --repo-id "${{ secrets.HF_REPO_ID || 'vishnun0027/techpulse-intelligence' }}" --private
