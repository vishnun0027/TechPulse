name: TechPulse AI Intelligence Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Select the job to execute'
        required: true
        default: 'export'
        type: choice
        options:
          - 'pipeline'
          - 'export'
          - 'all'

permissions:
  contents: read

concurrency:
  group: techpulse-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    if: |
      (github.event_name == 'schedule' && github.event.schedule != '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'pipeline' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Execute Full Intelligence Sequence
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          COLLECTION_INTERVAL_DAYS: 14
          PYTHONPATH: src
        run: uv run techpulse-ops run all

      - name: Process User Feedback Loop
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          PYTHONPATH: src
        run: uv run techpulse-ops run feedback-loop --days 1

  weekly-hf-export:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'export' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Export to Hugging Face
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: src
        run: |
          # Replace 'your-username/techpulse-intelligence' with your preferred repo ID
          uv run techpulse-ops run hf-export --repo-id "${{ secrets.HF_REPO_ID || 'vishnun0027/techpulse-intelligence' }}" --private
