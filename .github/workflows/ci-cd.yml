name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Continuous Integration (Tests & Lint on VM)
    runs-on: ubuntu-latest

    steps:
      - name: Run CI checks on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: vishnu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            /home/vishnu/worklab/techpulse-ai/scripts/cicd.sh --ci-only

  cd:
    name: Continuous Deployment (Deploy on VM)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: vishnu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            /home/vishnu/worklab/techpulse-ai/scripts/cicd.sh --cd-only
